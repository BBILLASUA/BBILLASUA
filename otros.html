<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios Formulario</title>
    <link rel="stylesheet" href="otros.css">
</head>
<body>
    <header>
        <nav> 
            <ul>
                <li><a href="Inicio.html">Inicio</a></li>
                <li><a href="Sobre Mi.html">Sobre Mi</a></li>
                <li><a href="Builder Servicio.html">Builder Servicio</a></li>
                <li><a href="Redes Sociales.html">Redes Sociales</a></li>
                <li><a href="otros.html">Servicios Formulario</a></li>
            </ul>
        </nav>
    </header>
    <header><br>
    <fieldset style="background:#ffffff; padding:16px 18px; border-radius:12px; box-shadow:0 10px 22px rgba(0,0,0,0.10); border: none; max-width: 720px; margin: 0 auto;">
        <legend style="padding:0 8px;"><h1 style="margin:0; font-size:1.4rem;">Datos de la Solicitud</h1></legend>
    <main>
        <section>
            <h2>Solicitud de Servicio - Construcción</h2>
            <p>El pago máximo permitido para este servicio es <strong>$250 USD</strong>. Completa el formulario y envíalo.</p>
            <form action="#" method="post" id="form-construccion" style="background: #ffffff; color: #111; padding: 18px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); max-width: 680px; margin: 0 auto;">
                <div>
                    <label for="nombre">Nombre completo:</label><br>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre completo" required>
                </div>

                <div>
                    <label for="tipo">Tipo de construcción:</label><br>
                    <select id="tipo" name="tipo" required>
                        <option value="">-- Selecciona --</option>
                        <option value="moderno">Moderno</option>
                        <option value="clasico">Clásico</option>
                        <option value="industrial">Industrial</option>
                        <option value="personalizado">Personalizado</option>
                    </select>
                </div>

                <div>
                    <label for="monto">Cantidad a pagar (USD) — máximo 250:</label><br>
                    <input type="number" id="monto" name="monto" min="0" max="250" step="0.01" placeholder="0.00" required>
                </div>

                <div>
                    <label for="precio">Precio acordado (USD):</label><br>
                    <input type="number" id="precio" name="precio" min="0" step="0.01" placeholder="0.00" required>
                </div>

                <div>
                    <label for="fecha">Fecha deseada:</label><br>
                    <input type="date" id="fecha" name="fecha">
                </div>

                <div>
                    <label for="discord">Tu Discord (usuario#0000):</label><br>
                    <input type="text" id="discord" name="discord" placeholder="usuario#1234">
                </div>


            </form>
        </section>
    </main>
    </fieldset>

                <div style="text-align:center;">
                    <button type="submit">Enviar solicitud</button>
                </div>
</body>
</html>
